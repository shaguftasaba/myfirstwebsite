<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Portfolio</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body class="admin-page">

  <div class="admin-login-container">
    <div class="login-box">
      <div class="login-header">
        <h1>Admin Panel</h1>
        <p class="login-subtitle">Portfolio Form Management</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            placeholder="Enter username"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter password"
            required
          />
        </div>

        <button type="submit" class="login-btn">Login to Admin Panel</button>
      </form>

      <div id="errorMessage" class="error-message" style="display: none;"></div>

      <div class="login-footer">
        <p class="info-text">
          Default Username: <strong>admin</strong><br>
          Default Password: <strong>portfolio123</strong>
        </p>
      </div>
    </div>

    <div class="login-background">
      <div class="circle circle1"></div>
      <div class="circle circle2"></div>
      <div class="circle circle3"></div>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
          // Store token in localStorage
          localStorage.setItem('adminToken', data.token);
          // Redirect to dashboard
          window.location.href = '/admin-dashboard.html';
        } else {
          errorMessage.textContent = data.message;
          errorMessage.style.display = 'block';
          document.getElementById('password').value = '';
        }
      } catch (error) {
        errorMessage.textContent = 'Error connecting to server. Make sure the backend is running.';
        errorMessage.style.display = 'block';
        console.error('Login error:', error);
      }
    });
  </script>

</body>
</html>
